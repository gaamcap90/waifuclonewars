<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#260960"/>
      <stop offset="100%" stop-color="#04010f"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Hex outline (game board motif) -->
  <polygon
    points="16,2.5 27,9 27,23 16,29.5 5,23 5,9"
    fill="rgba(34,211,238,0.05)"
    stroke="#22d3ee"
    stroke-width="1"
    opacity="0.55"
    filter="url(#softglow)"
  />

  <!-- Sword 1 (NW → SE) — cyan -->
  <!-- Blade -->
  <line x1="9.5" y1="9" x2="23" y2="22.5" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Guard (perpendicular near top) -->
  <line x1="8" y1="13" x2="13.5" y2="7.5" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round" filter="url(#softglow)"/>
  <!-- Pommel dot -->
  <circle cx="23.5" cy="23.5" r="1.2" fill="#22d3ee" opacity="0.7"/>

  <!-- Sword 2 (NE → SW) — purple -->
  <!-- Blade -->
  <line x1="22.5" y1="9" x2="9" y2="22.5" stroke="#c084fc" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Guard -->
  <line x1="24" y1="13" x2="18.5" y2="7.5" stroke="#c084fc" stroke-width="1.6" stroke-linecap="round" filter="url(#softglow)"/>
  <!-- Pommel dot -->
  <circle cx="8.5" cy="23.5" r="1.2" fill="#c084fc" opacity="0.7"/>

  <!-- Center gem where swords cross -->
  <circle cx="16" cy="16" r="2.8" fill="#04010f" opacity="0.9"/>
  <circle cx="16" cy="16" r="1.8" fill="#fff" opacity="0.95" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="1.1" fill="#22d3ee"/>
</svg>
